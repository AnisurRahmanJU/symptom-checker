<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লক্ষণ ও প্রতিকার</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🩺 আনিকা মেডিকেল ও স্বাস্থ্যসেবা</h1>
            <h3> লক্ষণ চেকার ( জ্বর, মাথাব্যথা, সর্দি )</h3>
        </header>

        <main>
            <div class="search-container">
                <input type="text" id="symptomInput" placeholder="লক্ষণ খুঁজুন বা টাইপ করুন...">
                <div id="suggestions" class="suggestions-box"></div>
            </div>

            <div id="selectedSymptoms" class="chip-container"></div>

            <div id="resultArea" class="result-container">
                <!-- ফলাফল এখানে দেখাবে -->
            </div>
        </main>

        <div class="disclaimer">
            <p>⚠️ <strong>সতর্কতা:</strong> এটি একটি পরীক্ষামূলক প্রজেক্ট। ঔষধ সেবনের পূর্বে অবশ্যই রেজিস্ট্রার্ড চিকিৎসকের পরামর্শ নিন।</p>
        </div>
    </div>
    <script src="symptom.js"></script>
</body>
</html>
